<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포지션 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/3a8d4f6c56.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <!-- 시작 화면 -->
        <div id="start-screen" class="retro-card">
            <h1>포지션 테스트</h1>
            <p>간단한 테스트를 통해 당신에게 어울리는 포지션을 알아보세요!</p>
            <button id="start-btn">테스트 시작</button>
        </div>

        <!-- 테스트 컨테이너 -->
        <div id="test-container" class="hidden">
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="questions-container">
                <!-- 질문 카드가 여기에 삽입됩니다. -->
            </div>
        </div>
        
        <!-- 결과 컨테이너 -->
        <div id="result-container" class="hidden">
            <!-- 결과 카드가 여기에 삽입됩니다. -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
