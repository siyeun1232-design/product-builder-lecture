<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포지션 테스트</title>
    <meta name="google-adsense-account" content="ca-pub-1375942611706544">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1375942611706544"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/3a8d4f6c56.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <!-- 시작 화면 -->
        <div id="start-screen" class="retro-card">
            <h1>포지션 테스트</h1>
            <p>간단한 테스트를 통해 당신에게 어울리는 포지션을 알아보세요!</p>
            <div class="button-group">
                <button id="start-btn">테스트 시작</button>
                <button id="inquiry-btn" class="secondary-btn">제휴 문의하기</button>
            </div>
        </div>

        <!-- 제휴 문의 폼 -->
        <div id="inquiry-container" class="hidden">
            <div class="retro-card">
                <h2>🤝 제휴 문의</h2>
                <p>협업 및 비즈니스 문의를 남겨주세요.</p>
                <form action="https://formspree.io/f/xbdpygbj" method="POST" id="inquiry-form">
                    <div class="input-group">
                        <label for="name">이름/기업명</label>
                        <input type="text" id="name" name="name" placeholder="성함 또는 기업명을 입력해주세요" required>
                    </div>
                    <div class="input-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 상세히 적어주세요" required></textarea>
                    </div>
                    <div class="button-group">
                        <button type="submit">문의 보내기</button>
                        <button type="button" id="back-to-start" class="secondary-btn">돌아가기</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 테스트 컨테이너 -->
        <div id="test-container" class="hidden">
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="questions-container">
                <!-- 질문 카드가 여기에 삽입됩니다. -->
            </div>
        </div>
        
        <!-- 결과 컨테이너 -->
        <div id="result-container" class="hidden">
            <!-- 결과 카드가 여기에 삽입됩니다. -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
